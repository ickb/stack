packages:
  - packages/*
  - apps/*
  # Local CCC workspace when materialized via `pnpm forks:bootstrap`.
  - forks/ccc/repo/packages/ccc
  - forks/ccc/repo/packages/ckb-ccc
  - forks/ccc/repo/packages/connector
  - forks/ccc/repo/packages/connector-react
  - forks/ccc/repo/packages/core
  - forks/ccc/repo/packages/did-ckb
  - forks/ccc/repo/packages/eip6963
  - forks/ccc/repo/packages/joy-id
  - forks/ccc/repo/packages/lumos-patches
  - forks/ccc/repo/packages/nip07
  - forks/ccc/repo/packages/okx
  - forks/ccc/repo/packages/rei
  - forks/ccc/repo/packages/shell
  - forks/ccc/repo/packages/spore
  - forks/ccc/repo/packages/ssri
  - forks/ccc/repo/packages/type-id
  - forks/ccc/repo/packages/udt
  - forks/ccc/repo/packages/uni-sat
  - forks/ccc/repo/packages/utxo-global
  - forks/ccc/repo/packages/xverse

auditConfig:
  ignoreCves:
    # Unpatched upstream: @joyid/ckb -> @nervosnetwork/ckb-sdk-utils -> elliptic.
    - CVE-2025-14505

overrides:
  # Security pins for vulnerable transitive ranges not yet lifted by upstreams.
  "@babel/core@<=7.29.0": 7.29.7
  "brace-expansion@>=5.0.0 <5.0.6": 5.0.6
  "esbuild@>=0.27.3 <0.28.1": 0.28.1
  "form-data@>=4.0.0 <4.0.6": 4.0.6
  "js-yaml@>=4.0.0 <=4.1.1": 4.2.0
  "vite@<=6.4.2": 6.4.3
  "vitest@<4.1.0": 4.1.8
  "ws@>=8.0.0 <8.21.0": 8.21.0
  # Keep published manifests on `catalog:` while forcing the materialized
  # local CCC workspace to satisfy direct stack dependencies during installs.
  # Update this list alongside any new direct `@ckb-ccc/*` dependency.
  "@ckb-ccc/ccc": workspace:*
  "@ckb-ccc/core": workspace:*
  "@ckb-ccc/udt": workspace:*

catalog:
  # Catalog tracks published fallback versions; forks/config.json only owns the
  # local clone refs that pnpm forks:bootstrap materializes under forks/ccc/repo.
  "@ckb-ccc/ccc": ^1.1.21
  "@ckb-ccc/core": ^1.12.2
  "@ckb-ccc/udt": ^0.1.24
  "@types/node": ^24.8.1

minimumReleaseAge: 1440
minimumReleaseAgeByPackage:
