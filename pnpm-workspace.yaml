packages:
  - packages/*
  - apps/*

auditConfig:
  ignoreCves:
    # Unpatched upstream: @joyid/ckb -> @nervosnetwork/ckb-sdk-utils -> elliptic.
    - CVE-2025-14505

overrides:
  # Security pins for vulnerable transitive ranges not yet lifted by upstreams.
  "@babel/core@<=7.29.0": 7.29.7
  "brace-expansion@>=5.0.0 <5.0.6": 5.0.6
  "esbuild@>=0.27.3 <0.28.1": 0.28.1
  "form-data@>=4.0.0 <4.0.6": 4.0.6
  "js-yaml@>=4.0.0 <=4.1.1": 4.2.0
  "vite@<=6.4.2": 6.4.3
  "vitest@<4.1.0": 4.1.8
  "ws@>=8.0.0 <8.21.0": 8.21.0

catalog:
  "@ckb-ccc/ccc": 1.2.0
  "@ckb-ccc/core": 1.14.0
  "@ckb-ccc/udt": 0.2.0
  "@types/node": ^24.8.1

minimumReleaseAge: 1440
minimumReleaseAgeByPackage:
